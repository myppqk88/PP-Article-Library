      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#e9efe4"/>
    </linearGradient>
    <linearGradient id="accent" x1="67" y1="49" x2="190" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d96f51"/>
