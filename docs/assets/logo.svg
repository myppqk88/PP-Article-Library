    <path d="M86 89h72M86 116h91M86 143h62" stroke="#28343d" stroke-opacity=".26" stroke-width="10" stroke-linecap="round"/>
    <path d="M78 186c18-17 38-17 56 0 18 17 38 17 56 0" fill="none" stroke="url(#accent)" stroke-width="11" stroke-linecap="round"/>
